  <div class="container">
    <a class="navbar-brand fw-bold text-success d-flex align-items-center" routerLink="/">
      <img src="images/logoo.png" alt="Logo" width="45" height="45" class="me-2 logo-navbar">
      <!-- Ho rimosso l'icona bi-leaf se hai già il logo, per non affollare -->

    <!-- 1. CONTROLLA QUI: Assicurati che data-bs-target sia identico all'id sotto -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- 2. IL MENU: L'id deve essere esattamente 'navbarNav' -->
    <!-- Ho aggiunto una variabile locale #nav per chiuderlo al click -->
    <div class="collapse navbar-collapse" id="navbarNav" #nav>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <!-- 3. TRUCCO: (click)="nav.classList.remove('show')" serve a chiudere il menu quando clicchi una voce sul cellulare -->
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="nav.classList.remove('show')">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/menu" routerLinkActive="active" (click)="nav.classList.remove('show')">Menu</a>
        </li>
        <li class="nav-item">
          <!-- 4. CORREZIONE: Ho tolto lo spazio dopo {exact: true} -->
          <a class="nav-link" routerLink="/contatti" routerLinkActive="active" (click)="nav.classList.remove('show')">Contatti</a>
        </li>
      </ul>
    </div>

</nav>
